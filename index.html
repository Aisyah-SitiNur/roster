<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedRoster - Premium Doctor On-Call Scheduler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF & AutoTable for Professional PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script>
        // Default doctors to seed the system with realistic medical personnel
        const INITIAL_DOCTORS = [
            { id: "doc-1", name: "Dr. Sarah Jenkins", roles: ["bloodbank", "hematopatho"], color: "emerald" },
            { id: "doc-2", name: "Dr. Michael Chen", roles: ["bloodbank"], color: "blue" },
            { id: "doc-3", name: "Dr. Aisha Rahman", roles: ["hematopatho"], color: "indigo" },
            { id: "doc-4", name: "Dr. David Kim", roles: ["bloodbank", "hematopatho"], color: "violet" },
            { id: "doc-5", name: "Dr. Elena Rostova", roles: ["hematopatho"], color: "purple" },
            { id: "doc-6", name: "Dr. Marcus Vance", roles: ["bloodbank"], color: "cyan" },
            { id: "doc-7", name: "Dr. James Carter", roles: ["bloodbank", "hematopatho"], color: "teal" },
            { id: "doc-8", name: "Dr. Priya Patel", roles: ["bloodbank", "hematopatho"], color: "rose" }
        ];

        // Seeded holidays for next month (June 2026)
        const INITIAL_HOLIDAYS = [
            "2026-06-01",
            "2026-06-15"
        ];

        // Seeded off-requests
        const INITIAL_REQUESTS = [
            { id: "req-1", doctorId: "doc-1", date: "2026-06-05", reason: "Conference" },
            { id: "req-2", doctorId: "doc-2", date: "2026-06-12", reason: "Family Event" },
            { id: "req-3", doctorId: "doc-3", date: "2026-06-20", reason: "Annual Leave" },
            { id: "req-4", doctorId: "doc-4", date: "2026-06-27", reason: "Research Day" }
        ];

        // Global State Object
        const state = {
            selectedYear: 2026,
            selectedMonth: 5, // June (0-indexed 5)
            doctors: JSON.parse(JSON.stringify(INITIAL_DOCTORS)),
            holidays: [...INITIAL_HOLIDAYS],
            requests: JSON.parse(JSON.stringify(INITIAL_REQUESTS)),
            roster: [],
            bloodbankCount: 1,
            hematopathoCount: 1,
            activeTab: "roster", // roster | statistics | settings
            highlightedDoctor: "all",
            toast: null,
            copiedText: ""
        };

        // Utility: Get number of days in selected month
        function getDaysInMonth() {
            return new Date(state.selectedYear, state.selectedMonth + 1, 0).getDate();
        }

        // Utility: Get month name
        function getMonthName() {
            return new Date(state.selectedYear, state.selectedMonth, 1).toLocaleString('default', { month: 'long' });
        }

        // Generate full metadata for each day in the active month
        function getDaysList() {
            const numDays = getDaysInMonth();
            const list = [];
            for (let d = 1; d <= numDays; d++) {
                const dateObj = new Date(state.selectedYear, state.selectedMonth, d);
                const dayOfWeek = dateObj.getDay(); // 0 = Sun, 6 = Sat
                const dateStr = `${state.selectedYear}-${String(state.selectedMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const isHoliday = state.holidays.includes(dateStr);
                
                list.push({
                    dayNum: d,
                    dateStr,
                    dayName: dateObj.toLocaleString('default', { weekday: 'long' }),
                    shortDayName: dateObj.toLocaleString('default', { weekday: 'short' }),
                    isWeekend,
                    isHoliday,
                    dayOfWeek
                });
            }
            return list;
        }

        // Display beautiful toast notifications without using browser alert()
        function showToast(message, type = "success") {
            state.toast = { message, type };
            renderApp();
            setTimeout(() => {
                state.toast = null;
                renderApp();
            }, 3500);
        }

        // Load baseline demo environment
        function loadDemoData() {
            state.doctors = JSON.parse(JSON.stringify(INITIAL_DOCTORS));
            state.holidays = [...INITIAL_HOLIDAYS];
            state.requests = JSON.parse(JSON.stringify(INITIAL_REQUESTS));
            state.roster = [];
            showToast("Demo scenario successfully loaded!", "success");
            renderApp();
        }

        // Toggle Holiday state
        function toggleHoliday(dateStr) {
            if (state.holidays.includes(dateStr)) {
                state.holidays = state.holidays.filter(h => h !== dateStr);
                showToast(`Removed public holiday: ${dateStr}`, "info");
            } else {
                state.holidays.push(dateStr);
                state.holidays.sort();
                showToast(`Registered public holiday: ${dateStr}`, "success");
            }
            renderApp();
        }

        // Add doctor to pool
        function addDoctor(name, isBB, isHP) {
            if (!name.trim()) return;
            const roles = [];
            if (isBB) roles.push("bloodbank");
            if (isHP) roles.push("hematopatho");

            if (roles.length === 0) {
                showToast("Please assign at least one role to this doctor.", "warning");
                return;
            }

            const colors = ["emerald", "blue", "indigo", "violet", "purple", "cyan", "teal", "rose", "orange", "amber"];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            state.doctors.push({
                id: `doc-${Date.now()}`,
                name: name.trim(),
                roles: roles,
                color: randomColor
            });
            showToast(`Dr. ${name} registered in directory`, "success");
            renderApp();
        }

        // Remove doctor
        function removeDoctor(id) {
            const doc = state.doctors.find(d => d.id === id);
            state.doctors = state.doctors.filter(d => d.id !== id);
            state.requests = state.requests.filter(r => r.doctorId !== id);
            showToast(`Removed ${doc ? doc.name : 'Doctor'}`, "info");
            renderApp();
        }

        // Add Manual Leave Request
        function addLeaveRequest(doctorId, date, reason) {
            if (!date) {
                showToast("Please enter a valid date.", "warning");
                return;
            }
            const exists = state.requests.some(r => r.doctorId === doctorId && r.date === date);
            if (exists) {
                showToast("Duplicate request exists for this doctor & date.", "warning");
                return;
            }

            state.requests.push({
                id: `req-${Date.now()}`,
                doctorId: doctorId,
                date: date,
                reason: reason.trim() || "Off Duty Request"
            });
            state.requests.sort((a,b) => a.date.localeCompare(b.date));
            showToast("Leave request registered successfully!", "success");
            renderApp();
        }

        // Remove Leave Request
        function removeLeaveRequest(id) {
            state.requests = state.requests.filter(r => r.id !== id);
            showToast("Leave constraint removed.", "info");
            renderApp();
        }

        // Parse CSV or Copy-pasted Google Sheet data
        function parseSheetText(text) {
            if (!text.trim()) {
                showToast("Please enter or paste your spreadsheet text.", "warning");
                return;
            }

            const lines = text.split("\n");
            let parsedCount = 0;
            let errorCount = 0;
            const newParsed = [];

            lines.forEach(line => {
                if (!line.trim()) return;
                const parts = line.split(/[\t,]+/);
                if (parts.length >= 2) {
                    const rawName = parts[0].trim();
                    const rawDate = parts[1].trim();
                    const reason = parts[2] ? parts[2].trim() : "Google Sheet Request";

                    const doctor = state.doctors.find(d => 
                        d.name.toLowerCase().includes(rawName.toLowerCase()) || 
                        rawName.toLowerCase().includes(d.name.toLowerCase())
                    );

                    let formattedDate = "";
                    if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
                        formattedDate = rawDate;
                    } else {
                        const dateObj = new Date(rawDate);
                        if (!isNaN(dateObj.getTime())) {
                            formattedDate = `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
                        }
                    }

                    if (doctor && formattedDate) {
                        newParsed.push({
                            id: `req-parsed-${Date.now()}-${Math.random()}`,
                            doctorId: doctor.id,
                            date: formattedDate,
                            reason: reason
                        });
                        parsedCount++;
                    } else {
                        errorCount++;
                    }
                } else {
                    errorCount++;
                }
            });

            if (newParsed.length > 0) {
                newParsed.forEach(newReq => {
                    if (!state.requests.some(r => r.doctorId === newReq.doctorId && r.date === newReq.date)) {
                        state.requests.push(newReq);
                    }
                });
                state.requests.sort((a,b) => a.date.localeCompare(b.date));
                state.copiedText = "";
                showToast(`Imported ${parsedCount} requests! ${errorCount ? `(${errorCount} skipped)` : ""}`, "success");
            } else {
                showToast("Could not recognize headers/values. Verify doctor names match exactly.", "error");
            }
            renderApp();
        }

        // -------------------------------------------------------------
        // Core Engine algorithm
        // -------------------------------------------------------------
        function generateRoster() {
            if (state.doctors.length === 0) {
                showToast("Please populate your Doctors Pool first.", "error");
                return;
            }

            const numDays = getDaysInMonth();
            const daysList = getDaysList();
            const stats = {};
            
            state.doctors.forEach(d => {
                stats[d.id] = {
                    total: 0,
                    weekday: 0,
                    weekendHoliday: 0,
                    lastAssignedDay: -99
                };
            });

            const generatedRoster = [];

            for (let d = 1; d <= numDays; d++) {
                const currentDay = daysList[d - 1];
                const dateStr = currentDay.dateStr;
                const isWeekendOrHoliday = currentDay.isWeekend || currentDay.isHoliday;

                const todayAssigned = {
                    dateStr,
                    dayNum: d,
                    dayName: currentDay.dayName,
                    shortDayName: currentDay.shortDayName,
                    isWeekend: currentDay.isWeekend,
                    isHoliday: currentDay.isHoliday,
                    bloodbank: [],
                    hematopatho: []
                };

                const assignSlot = (roleType, countNeeded) => {
                    for (let slot = 0; slot < countNeeded; slot++) {
                        let candidates = state.doctors.filter(doc => doc.roles.includes(roleType));

                        // 1. Filter out off requests
                        candidates = candidates.filter(doc => {
                            return !state.requests.some(r => r.doctorId === doc.id && r.date === dateStr);
                        });

                        // 2. Filter out already assigned today
                        candidates = candidates.filter(doc => {
                            return !todayAssigned.bloodbank.some(da => da.id === doc.id) &&
                                   !todayAssigned.hematopatho.some(da => da.id === doc.id);
                        });

                        // 3. Back-to-back shift logic (strict exception on weekends only)
                        let finalCandidates = candidates.filter(doc => {
                            const lastCall = stats[doc.id].lastAssignedDay;
                            const isConsecutive = (d - lastCall) === 1;

                            if (isConsecutive) {
                                const yesterdayObj = daysList[d - 2];
                                const isYesterdayWeekend = yesterdayObj ? yesterdayObj.isWeekend : false;
                                const isTodayWeekend = currentDay.isWeekend;
                                return isYesterdayWeekend && isTodayWeekend;
                            }
                            return true;
                        });

                        let warning = false;
                        if (finalCandidates.length === 0 && candidates.length > 0) {
                            finalCandidates = candidates;
                            warning = true;
                        }

                        if (finalCandidates.length === 0) {
                            finalCandidates = state.doctors.filter(doc => doc.roles.includes(roleType) &&
                                !todayAssigned.bloodbank.some(da => da.id === doc.id) &&
                                !todayAssigned.hematopatho.some(da => da.id === doc.id)
                            );
                            warning = true;
                        }

                        if (finalCandidates.length === 0) {
                            todayAssigned[roleType].push({ id: "unassigned", name: "⚠️ Unassigned", color: "slate", conflict: true });
                            continue;
                        }

                        // Score candidates based on equity/workload
                        finalCandidates.sort((a, b) => {
                            const statA = stats[a.id];
                            const statB = stats[b.id];

                            if (isWeekendOrHoliday) {
                                if (statA.weekendHoliday !== statB.weekendHoliday) {
                                    return statA.weekendHoliday - statB.weekendHoliday;
                                }
                            } else {
                                if (statA.weekday !== statB.weekday) {
                                    return statA.weekday - statB.weekday;
                                }
                            }

                            if (statA.total !== statB.total) {
                                return statA.total - statB.total;
                            }

                            return statA.lastAssignedDay - statB.lastAssignedDay;
                        });

                        const chosen = finalCandidates[0];

                        todayAssigned[roleType].push({
                            id: chosen.id,
                            name: chosen.name,
                            color: chosen.color,
                            conflict: warning
                        });

                        stats[chosen.id].total += 1;
                        if (isWeekendOrHoliday) {
                            stats[chosen.id].weekendHoliday += 1;
                        } else {
                            stats[chosen.id].weekday += 1;
                        }
                        stats[chosen.id].lastAssignedDay = d;
                    }
                };

                assignSlot("bloodbank", state.bloodbankCount);
                assignSlot("hematopatho", state.hematopathoCount);

                generatedRoster.push(todayAssigned);
            }

            state.roster = generatedRoster;
            showToast("Equitable doctor on-call roster calculated!", "success");
            renderApp();
        }

        // Handle manual override selections
        function applyManualOverride(dayNum, role, slotIndex, newDoctorId) {
            const doc = state.doctors.find(d => d.id === newDoctorId) || { id: "unassigned", name: "⚠️ Unassigned", color: "slate" };
            state.roster = state.roster.map(day => {
                if (day.dayNum === dayNum) {
                    const list = [...day[role]];
                    list[slotIndex] = {
                        id: doc.id,
                        name: doc.name,
                        color: doc.color,
                        conflict: false
                    };
                    return { ...day, [role]: list };
                }
                return day;
            });
            showToast(`Roster override modified successfully`, "info");
            renderApp();
        }

        // Live stats calculations
        function calculateLiveStats() {
            const stats = {};
            state.doctors.forEach(d => {
                stats[d.id] = {
                    id: d.id,
                    name: d.name,
                    color: d.color,
                    total: 0,
                    weekday: 0,
                    weekendHoliday: 0,
                    assignedDates: []
                };
            });

            state.roster.forEach(day => {
                const isWeekendOrHoliday = day.isWeekend || day.isHoliday;
                
                day.bloodbank.forEach(d => {
                    if (stats[d.id]) {
                        stats[d.id].total++;
                        stats[d.id].assignedDates.push(day.dateStr);
                        if (isWeekendOrHoliday) stats[d.id].weekendHoliday++;
                        else stats[d.id].weekday++;
                    }
                });

                day.hematopatho.forEach(d => {
                    if (stats[d.id]) {
                        stats[d.id].total++;
                        stats[d.id].assignedDates.push(day.dateStr);
                        if (isWeekendOrHoliday) stats[d.id].weekendHoliday++;
                        else stats[d.id].weekday++;
                    }
                });
            });

            return Object.values(stats);
        }

        // Live validation checks
        function getValidationConflicts() {
            const warnings = {};
            const roster = state.roster;

            for (let i = 0; i < roster.length; i++) {
                const currentDay = roster[i];
                const nextDay = roster[i + 1];

                const currentScheduled = [...currentDay.bloodbank, ...currentDay.hematopatho].map(d => d.id);

                // 1. Double Assignment checking
                const duplicates = currentScheduled.filter((item, idx) => currentScheduled.indexOf(item) !== idx && item !== "unassigned");
                if (duplicates.length > 0) {
                    warnings[`${currentDay.dayNum}-double`] = `Doctor assigned to multiple roles on Day ${currentDay.dayNum}`;
                }

                // 2. Back to Back checking
                if (nextDay) {
                    const nextScheduled = [...nextDay.bloodbank, ...nextDay.hematopatho].map(d => d.id);
                    currentScheduled.forEach(docId => {
                        if (docId !== "unassigned" && nextScheduled.includes(docId)) {
                            const isCurrentWeekend = currentDay.isWeekend;
                            const isNextWeekend = nextDay.isWeekend;
                            if (!(isCurrentWeekend && isNextWeekend)) {
                                const doc = state.doctors.find(d => d.id === docId);
                                warnings[`${currentDay.dayNum}-b2b-${docId}`] = `${doc ? doc.name : 'Doctor'} scheduled back-to-back outside weekend on Day ${currentDay.dayNum} & ${nextDay.dayNum}`;
                            }
                        }
                    });
                }

                // 3. Requested Off conflict checking
                currentScheduled.forEach(docId => {
                    if (docId !== "unassigned") {
                        const leave = state.requests.some(r => r.doctorId === docId && r.date === currentDay.dateStr);
                        if (leave) {
                            const doc = state.doctors.find(d => d.id === docId);
                            warnings[`${currentDay.dayNum}-leave-${docId}`] = `${doc ? doc.name : 'Doctor'} scheduled on requested day off (${currentDay.dateStr})`;
                        }
                    }
                });
            }

            return warnings;
        }

        // Calculate Workload balance deviation metrics
        function getEquityHealth() {
            const stats = calculateLiveStats();
            if (stats.length === 0) return { score: 100, label: "Empty Roster", color: "text-slate-400" };
            const totals = stats.map(s => s.total);
            const sum = totals.reduce((a, b) => a + b, 0);
            const average = sum / stats.length;
            if (average === 0) return { score: 100, label: "Perfect Balance", color: "text-emerald-500 bg-emerald-50 border-emerald-200" };

            const variance = totals.map(x => Math.pow(x - average, 2)).reduce((a,b) => a+b, 0) / stats.length;
            const stdDev = Math.sqrt(variance);

            let label = "Perfect Balance";
            let color = "text-emerald-600 bg-emerald-50 border-emerald-200";

            if (stdDev > 2.0) {
                label = "Unbalanced";
                color = "text-rose-600 bg-rose-50 border-rose-200";
            } else if (stdDev > 1.0) {
                label = "Moderately Balanced";
                color = "text-amber-600 bg-amber-50 border-amber-200";
            } else if (stdDev > 0.4) {
                label = "Highly Balanced";
                color = "text-blue-600 bg-blue-50 border-blue-200";
            }

            return {
                stdDev: stdDev.toFixed(2),
                average: average.toFixed(1),
                label,
                color
            };
        }

        // -------------------------------------------------------------
        // CSV Spreadsheet Export
        // -------------------------------------------------------------
        function downloadCSV() {
            if (state.roster.length === 0) {
                showToast("Please generate a roster first.", "error");
                return;
            }

            let csv = "\uFEFF";
            csv += "Date,Day,Status,Bloodbank On-Call,Hemato/Patho On-Call\n";

            state.roster.forEach(day => {
                const status = day.isHoliday ? "Holiday" : day.isWeekend ? "Weekend" : "Weekday";
                const bb = day.bloodbank.map(d => d.name).join(" | ");
                const hp = day.hematopatho.map(d => d.name).join(" | ");
                csv += `${day.dateStr},${day.dayName},${status},"${bb}","${hp}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `OnCall_Roster_${getMonthName()}_${state.selectedYear}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("CSV file downloaded!", "success");
        }

        // -------------------------------------------------------------
        // Professional PDF Export
        // -------------------------------------------------------------
        function downloadPDF() {
            if (state.roster.length === 0) {
                showToast("Please generate a roster first.", "error");
                return;
            }

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    orientation: 'p',
                    unit: 'mm',
                    format: 'a4'
                });

                const primaryColor = [15, 23, 42];
                const secondaryColor = [16, 185, 129];

                // Page 1: Header banner
                doc.setFillColor(...primaryColor);
                doc.rect(0, 0, 210, 38, 'F');

                doc.setTextColor(255, 255, 255);
                doc.setFont("Helvetica", "bold");
                doc.setFontSize(22);
                doc.text("ON-CALL ROSTER", 14, 16);

                doc.setFont("Helvetica", "normal");
                doc.setFontSize(11);
                doc.setTextColor(165, 180, 252);
                doc.text(`Department of Pathology & Transfusion Medicine | ${getMonthName().toUpperCase()} ${state.selectedYear}`, 14, 23);

                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.text(`Generated: ${new Date().toLocaleDateString()}`, 14, 30);
                doc.text(`Total Doctors Assigned: ${state.doctors.length}`, 145, 30);

                doc.setFillColor(...secondaryColor);
                doc.rect(0, 38, 210, 2, 'F');

                const tableRows = [];
                state.roster.forEach(day => {
                    const dateNum = day.dateStr.split('-')[2];
                    let dateText = `${dateNum} ${day.shortDayName}`;
                    if (day.isHoliday) dateText += " (Holiday)";

                    const bbNames = day.bloodbank.map(d => d.name).join(", ");
                    const hpNames = day.hematopatho.map(d => d.name).join(", ");

                    tableRows.push([dateText, bbNames, hpNames]);
                });

                doc.autoTable({
                    head: [['Date', 'Bloodbank On-Call', 'Hemato/Patho On-Call']],
                    body: tableRows,
                    startY: 46,
                    theme: 'grid',
                    headStyles: {
                        fillColor: primaryColor,
                        textColor: [255, 255, 255],
                        fontSize: 10,
                        fontStyle: 'bold',
                        halign: 'left'
                    },
                    columnStyles: {
                        0: { width: 45, fontStyle: 'bold' },
                        1: { width: 75 },
                        2: { width: 75 }
                    },
                    alternateRowStyles: {
                        fillColor: [248, 250, 252]
                    },
                    didParseCell: function (data) {
                        const dayIndex = data.row.index;
                        const dayObj = state.roster[dayIndex];
                        if (dayObj && data.cell.section === 'body') {
                            if (dayObj.isHoliday) {
                                data.cell.styles.fillColor = [254, 242, 242];
                                data.cell.styles.textColor = [153, 27, 27];
                            } else if (dayObj.isWeekend) {
                                data.cell.styles.fillColor = [240, 253, 250];
                            }
                        }
                    },
                    margin: { left: 14, right: 14 },
                    styles: {
                        font: "Helvetica",
                        fontSize: 9,
                        cellPadding: 3
                    }
                });

                doc.save(`OnCall_Roster_${getMonthName()}_${state.selectedYear}.pdf`);
                showToast("PDF file downloaded!", "success");
            } catch (err) {
                console.error(err);
                showToast("Failed to compile PDF document", "error");
            }
        }

        // -------------------------------------------------------------
        // APPLICATION RENDERING ENGINE (Vanilla JS Reactivity)
        // -------------------------------------------------------------
        function renderApp() {
            const root = document.getElementById('root');
            const activeMonthName = getMonthName();
            const daysList = getDaysList();
            const liveStats = calculateLiveStats();
            const conflicts = getValidationConflicts();
            const conflictCount = Object.keys(conflicts).length;
            const equity = getEquityHealth();

            root.innerHTML = `
                <div class="flex flex-col min-h-screen">
                    <!-- Top Navigation Bar -->
                    <header class="bg-slate-900 text-white shadow-md border-b border-slate-800 shrink-0">
                        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div class="flex items-center gap-3">

                                                    <input 
                                                        type="number" 
                                                        min="1" 
                                                        value="${state.hematopathoCount}"
                                                        onchange="state.hematopathoCount = Math.max(1, parseInt(this.value)); renderApp();"
                                                        class="w-20 border border-slate-200 rounded-lg p-2 font-bold focus:ring-2 focus:ring-emerald-500 outline-none"
                                                    />
                                                    <span class="text-xs text-slate-400">Recommended: 1 Doctor per Day</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Doctors Directory -->
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h2 class="font-extrabold text-slate-800 text-lg mb-2">Doctor Directory & Specialties</h2>
                                        <p class="text-xs text-slate-400 mb-4">Create or remove active physicians from the rotation schedule</p>

                                        <div class="bg-slate-50 p-4 border border-slate-200 rounded-xl mb-4 flex flex-col md:flex-row gap-4 items-end">
                                            <div class="flex-1 w-full">
                                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Doctor Name</label>
                                                <input 
                                                    type="text"
                                                    id="newDocNameField"
                                                    placeholder="Dr. Gregory House"
                                                    class="w-full text-sm border border-slate-200 rounded-lg p-2 outline-none focus:ring-2 focus:ring-emerald-500"
                                                />
                                            </div>
                                            
                                            <div class="flex items-center gap-4 py-2">
                                                <label class="flex items-center gap-1.5 text-xs font-semibold text-slate-700 cursor-pointer">
                                                    <input type="checkbox" id="newDocBBCheckbox" checked class="accent-emerald-500" />
                                                    Bloodbank
                                                </label>
                                                <label class="flex items-center gap-1.5 text-xs font-semibold text-slate-700 cursor-pointer">
                                                    <input type="checkbox" id="newDocHPCheckbox" checked class="accent-emerald-500" />
                                                    Hemato/Patho
                                                </label>
                                            </div>

                                            <button 
                                                onclick="addDoctor(document.getElementById('newDocNameField').value, document.getElementById('newDocBBCheckbox').checked, document.getElementById('newDocHPCheckbox').checked)"
                                                class="px-5 py-2 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-lg transition-all"
                                            >
                                                + Register Doctor
                                            </button>
                                        </div>

                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-96 overflow-y-auto">
                                            ${state.doctors.map(doc => `
                                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100 flex justify-between items-center shadow-sm">
                                                    <div>
                                                        <p class="font-bold text-sm text-slate-800">${doc.name}</p>
                                                        <div class="flex gap-1.5 mt-1">
                                                            ${doc.roles.includes('bloodbank') ? `<span class="text-[9px] bg-blue-100 text-blue-800 px-1.5 rounded-full font-bold uppercase">BB</span>` : ''}
                                                            ${doc.roles.includes('hematopatho') ? `<span class="text-[9px] bg-indigo-100 text-indigo-800 px-1.5 rounded-full font-bold uppercase">HP</span>` : ''}
                                                        </div>
                                                    </div>
                                                    <button 
                                                        onclick="removeDoctor('${doc.id}')"
                                                        class="text-xs font-bold text-rose-500 hover:bg-rose-50 px-2 py-1 rounded"
                                                    >
                                                        Remove
                                                    </button>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>

                                    <!-- Leave Constraints Dashboard -->
                                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <h2 class="font-extrabold text-slate-800 text-lg mb-2">Duty Exclusion Constraints</h2>
                                        <p class="text-xs text-slate-400 mb-4">Individually lock days off request rules to prevent scheduling on desired dates</p>

                                        <div class="bg-slate-50 p-4 border border-slate-200 rounded-xl mb-4 flex flex-col md:flex-row gap-4 items-end">
                                            <div class="w-full md:w-1/3">
                                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Select Physician</label>
                                                <select id="leaveDoctorField" class="w-full text-sm border border-slate-200 rounded-lg p-2 outline-none bg-white cursor-pointer">
                                                    ${state.doctors.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
                                                </select>
                                            </div>

                                            <div class="w-full md:w-1/3">
                                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Leave Date</label>
                                                <input type="date" id="leaveDateField" class="w-full text-sm border border-slate-200 rounded-lg p-2 outline-none bg-white" />
                                            </div>

                                            <div class="w-full md:w-1/3">
                                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Constraint Reason</label>
                                                <input type="text" id="leaveReasonField" placeholder="Vacation / Research Duty" class="w-full text-sm border border-slate-200 rounded-lg p-2 outline-none bg-white" />
                                            </div>

                                            <button 
                                                onclick="addLeaveRequest(document.getElementById('leaveDoctorField').value, document.getElementById('leaveDateField').value, document.getElementById('leaveReasonField').value)"
                                                class="px-5 py-2 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-lg transition-all"
                                            >
                                                + Register Exclusion
                                            </button>
                                        </div>

                                        <div class="border border-slate-100 rounded-xl overflow-hidden max-h-60 overflow-y-auto">
                                            ${state.requests.length === 0 ? `
                                                <p class="p-4 text-xs text-slate-400 italic text-center">No active exclusion constraints stored.</p>
                                            ` : `
                                                <table class="w-full text-left text-xs divide-y divide-slate-100">
                                                    <thead class="bg-slate-50 text-slate-500 uppercase font-bold">
                                                        <tr>
                                                            <th class="p-3">Doctor</th>
                                                            <th class="p-3">Exclusion Date</th>
                                                            <th class="p-3">Reason</th>
                                                            <th class="p-3 text-right">Action</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-slate-100">
                                                        ${state.requests.map(req => {
                                                            const doc = state.doctors.find(d => d.id === req.doctorId);
                                                            return `
                                                                <tr class="hover:bg-slate-50">
                                                                    <td class="p-3 font-semibold text-slate-800">${doc ? doc.name : 'Unregistered'}</td>
                                                                    <td class="p-3 font-mono">${req.date}</td>
                                                                    <td class="p-3 text-slate-500">${req.reason}</td>
                                                                    <td class="p-3 text-right">
                                                                        <button onclick="removeLeaveRequest('${req.id}')" class="text-rose-600 hover:text-rose-800 font-bold">Delete</button>
                                                                    </td>
                                                                </tr>
                                                            `;
                                                        }).join('')}
                                                    </tbody>
                                                </table>
                                            `}
                                        </div>
                                    </div>

                                </div>
                            ` : ''}

                        </div>
                    </main>

                    <!-- Real-time dynamic system notifications -->
                    ${state.toast ? `
                        <div class="fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl border shadow-xl flex items-center gap-3 transition-all ${
                            state.toast.type === 'error' ? 'bg-rose-500 border-rose-600 text-white' :
                            state.toast.type === 'warning' ? 'bg-amber-500 border-amber-600 text-white' :
                            state.toast.type === 'info' ? 'bg-blue-600 border-blue-700 text-white' :
                            'bg-slate-900 border-slate-800 text-white'
                        }">
                            <span class="text-lg">
                                ${state.toast.type === 'error' ? '🛑' :
                                  state.toast.type === 'warning' ? '⚠️' :
                                  state.toast.type === 'info' ? 'ℹ️' : '✅'}
                            </span>
                            <span class="text-sm font-semibold">${state.toast.message}</span>
                        </div>
                    ` : ''}

                    <footer class="bg-slate-100 border-t border-slate-200 py-4 shrink-0 mt-8 text-center text-xs text-slate-400">
                        <p>© 2026 MedRoster Scheduling Platform. Highly Optimized Native Application Layout.</p>
                    </footer>
                </div>
            `;
        }

        // Initialize Native Page Render
        window.onload = function() {
            renderApp();
        };
    </script>
</body>
</html>
